<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVtools — Créez votre CV professionnel</title>
  <meta name="description" content="Créez votre CV professionnel en 5 minutes. 20 modèles, sans inscription, téléchargement PDF instantané." />
  <meta name="theme-color" content="#b85c38" />
  <meta property="og:title" content="CVtools — Créez votre CV" />
  <meta property="og:description" content="Créez votre CV professionnel en 5 minutes. 20 modèles, sans inscription." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:type" content="website" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CVtools" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1c1812; }

    #splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #1c1812;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      transition: opacity 0.5s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-logo {
      width: 72px;
      height: 72px;
      background: #b85c38;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoPop 0.6s cubic-bezier(0.16,1,0.3,1) both;
      box-shadow: 0 8px 32px rgba(184,92,56,0.4);
    }
    .splash-logo svg { width: 42px; height: 42px; }
    .splash-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 700;
      font-style: italic;
      color: #fff;
      letter-spacing: 1px;
      animation: fadeUp 0.5s 0.2s both;
    }
    .splash-subtitle {
      font-family: sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      animation: fadeUp 0.5s 0.3s both;
    }
    .splash-dots {
      display: flex;
      gap: 8px;
      animation: fadeUp 0.5s 0.4s both;
    }
    .splash-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #b85c38;
      animation: dot 1.2s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: 0.2s; }
    .splash-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes logoPop {
      from { opacity:0; transform: scale(0.7); }
      to   { opacity:1; transform: scale(1); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }
    @keyframes dot {
      0%,80%,100% { opacity:0.2; transform: scale(0.8); }
      40%          { opacity:1;   transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <!-- Splash screen — visible immédiatement, disparaît quand React est prêt -->
  <div id="splash">
    <div class="splash-logo">
      <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="21" y="32" text-anchor="middle"
          fill="white" font-family="Georgia,serif"
          font-size="30" font-weight="700" font-style="italic">C</text>
      </svg>
    </div>
    <div class="splash-title">CVtools</div>
    <div class="splash-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="splash-subtitle">Chargement en cours...</div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

  <script>
    // Cacher le splash dès que React a rendu
    window.__hideSplash = function() {
      var s = document.getElementById('splash');
      if (s) {
        s.classList.add('hidden');
        setTimeout(function(){ s.remove(); }, 500);
      }
    };
    // Fallback — cacher après 6 secondes max
    setTimeout(function(){ window.__hideSplash && window.__hideSplash(); }, 6000);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(){ console.log('CVtools PWA prêt'); })
          .catch(function(err){ console.warn('SW:', err); });
      });
    }
  </script>
</body>
</html>
