<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CVtools — Créez votre CV professionnel</title>

  <!-- SEO -->
  <meta name="description" content="Créez votre CV professionnel en 5 minutes. 20 modèles, sans inscription, téléchargement PDF instantané." />
  <meta name="theme-color" content="#b85c38" />

  <!-- Open Graph -->
  <meta property="og:title" content="CVtools — Créez votre CV" />
  <meta property="og:description" content="Créez votre CV professionnel en 5 minutes. 20 modèles, sans inscription." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:type" content="website" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Apple PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="CVtools" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <!-- Service Worker PWA -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/sw.js')
          .then(() => console.log('CVtools PWA prêt — mode hors ligne actif'))
          .catch(err => console.warn('SW:', err));
      });
    }
  </script>
</body>
</html>
